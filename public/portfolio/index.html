<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Screen Placeholder</title>
    <style>
      :root {
        font-family: "MS Gothic", "Courier New", monospace;
        color: #d9ffd4;
        background: #061109;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 20px;
        background:
          repeating-linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.05) 0,
            rgba(255, 255, 255, 0.05) 1px,
            transparent 1px,
            transparent 4px
          ),
          #061109;
      }

      main {
        width: min(520px, 100%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.55;
      }

      a {
        color: #d7ff7a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NeoDoggy.exe</h1>
      <p>This placeholder is where your existing 2D portfolio will appear.</p>
      <p>Replace this folder with your built 2D site, or set <code>VITE_PORTFOLIO_URL</code> to a hosted URL.</p>
      <p><a href="https://github.com/NeoDoggy" target="_blank" rel="noreferrer">github.com/NeoDoggy</a></p>
    </main>
  </body>
</html>
